<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue-ish dark tile background -->
    <linearGradient id="bg" x1="76" y1="52" x2="432" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2230"/>
      <stop offset="0.5" stop-color="#101826"/>
      <stop offset="1" stop-color="#0A1019"/>
    </linearGradient>

    <!-- Metallic mark -->
    <linearGradient id="metal" x1="150" y1="92" x2="370" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.42" stop-color="#DCE1E8"/>
      <stop offset="1" stop-color="#ABB5C2"/>
    </linearGradient>

    <!-- Harbor-ish blue accent -->
    <linearGradient id="accent" x1="320" y1="332" x2="388" y2="398" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8FC0FF"/>
      <stop offset="0.55" stop-color="#5A97FF"/>
      <stop offset="1" stop-color="#2E6FFF"/>
    </linearGradient>

    <!-- Tile shadow -->
    <filter id="tileShadow" x="12" y="12" width="488" height="488" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.48"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.06"/>
    </filter>

    <!-- Mark visibility -->
    <filter id="markShadow" x="96" y="78" width="336" height="364" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#FFFFFF" flood-opacity="0.18"/>
    </filter>

    <!-- Node shadow -->
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <!-- Accent glow -->
    <filter id="accentGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#4D8DFF" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#4D8DFF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect
    x="40"
    y="40"
    width="432"
    height="432"
    rx="96"
    fill="url(#bg)"
    stroke="#2A3850"
    stroke-width="1.5"
    filter="url(#tileShadow)"
  />

  <!-- subtle inner rim -->
  <rect
    x="52"
    y="52"
    width="408"
    height="408"
    rx="86"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.045"
    stroke-width="1"
  />

  <!-- lowercase h mark -->
  <g filter="url(#markShadow)" stroke="url(#metal)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- left stem -->
    <path d="M188 128 V364"/>

    <!-- more geometric / clearer h shoulder -->
    <path
      d="M188 252
         C208 232 248 228 286 238
         C328 249 348 281 348 320
         V364"
    />
  </g>

  <!-- silver nodes -->
  <g filter="url(#nodeShadow)">
    <circle cx="188" cy="128" r="31" fill="url(#metal)"/>
    <circle cx="188" cy="128" r="13" fill="#0C1320"/>

    <circle cx="188" cy="364" r="29" fill="url(#metal)"/>
    <circle cx="188" cy="364" r="12" fill="#0C1320"/>
  </g>

  <!-- blue accent node -->
  <g filter="url(#accentGlow)">
    <g filter="url(#nodeShadow)">
      <circle cx="348" cy="364" r="29" fill="url(#accent)"/>
      <circle cx="348" cy="364" r="12" fill="#0C1320"/>
    </g>
  </g>
</svg>
