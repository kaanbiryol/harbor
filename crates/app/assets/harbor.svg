<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="58" x2="420" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171D26"/>
      <stop offset="0.55" stop-color="#101722"/>
      <stop offset="1" stop-color="#090D14"/>
    </linearGradient>

    <linearGradient id="metal" x1="150" y1="90" x2="360" y2="390" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#D8DCE3"/>
      <stop offset="1" stop-color="#AEB6C2"/>
    </linearGradient>

    <linearGradient id="accent" x1="316" y1="326" x2="380" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AB7FF"/>
      <stop offset="0.55" stop-color="#5B94F5"/>
      <stop offset="1" stop-color="#2F6FE8"/>
    </linearGradient>

    <filter id="tileShadow" x="20" y="20" width="472" height="472" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FFFFFF" flood-opacity="0.07"/>
    </filter>

    <filter id="markShadow" x="110" y="80" width="310" height="350" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#FFFFFF" flood-opacity="0.22"/>
    </filter>

    <filter id="nodeShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect
    x="46"
    y="46"
    width="420"
    height="420"
    rx="92"
    fill="url(#bg)"
    stroke="#263244"
    stroke-width="1.5"
    filter="url(#tileShadow)"
  />

  <rect
    x="58"
    y="58"
    width="396"
    height="396"
    rx="82"
    fill="none"
    stroke="#FFFFFF"
    stroke-opacity="0.045"
    stroke-width="1"
  />

  <g filter="url(#markShadow)" stroke="url(#metal)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path d="M188 132 V360"/>
    <path
      d="M188 254
         C210 232 250 226 286 238
         C324 250 346 282 346 320
         V360"
    />
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="188" cy="132" r="29" fill="url(#metal)"/>
    <circle cx="188" cy="132" r="11" fill="#0C1119"/>

    <circle cx="188" cy="360" r="25" fill="url(#metal)"/>
    <circle cx="188" cy="360" r="9.5" fill="#0C1119"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="346" cy="360" r="25" fill="url(#accent)"/>
    <circle cx="346" cy="360" r="9.5" fill="#0C1119"/>
  </g>
</svg>
